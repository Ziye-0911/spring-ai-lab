server:
  port: 8080

spring:
  application:
    name: spring-ai-lab
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      base-url: https://token-plan-cn.xiaomimimo.com/v1
      model: qwen-plus
      max-tokens: 2048
      temperature: 0.7
      connect-timeout: 30
      read-timeout: 120
    lab:
      memory:
        type: in-memory
        ttl-minutes: 30
        max-history: 50
        cleanup-interval-minutes: 60
      observation:
        token-tracking: true
        latency-tracking: true

logging:
  level:
    com.liziye.spring.ai.lab: DEBUG
